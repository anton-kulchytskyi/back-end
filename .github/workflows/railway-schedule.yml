name: Railway — Sleep/Wake Schedule

on:
  schedule:
    # All times UTC. Ukraine is UTC+2 (winter) / UTC+3 (summer — update cron accordingly after DST).
    - cron: '30 20 * * *'  # 22:30 Kyiv (UTC+2) — stop service
    - cron: '0 6 * * *'    # 08:00 Kyiv (UTC+2) — start service
  workflow_dispatch:
    inputs:
      action:
        description: 'Manual override: start or stop the Railway service'
        required: true
        type: choice
        options:
          - start
          - stop

env:
  RAILWAY_API: https://backboard.railway.app/graphql/v2

jobs:
  manage-railway:
    name: Set Railway service state
    runs-on: ubuntu-latest

    steps:
      - name: Determine action
        id: config
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "action=${{ github.event.inputs.action }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event.schedule }}" == "30 20 * * *" ]]; then
            echo "action=stop" >> "$GITHUB_OUTPUT"
          else
            echo "action=start" >> "$GITHUB_OUTPUT"
          fi

      # ── STOP: find active deployment and remove it ───────────────────────────
      - name: Get active deployment ID
        if: steps.config.outputs.action == 'stop'
        id: deployment
        env:
          TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
          ENVIRONMENT_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
        run: |
          RESPONSE=$(curl -s -X POST "$RAILWAY_API" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"{ deployments(input: { serviceId: \\\"$SERVICE_ID\\\", environmentId: \\\"$ENVIRONMENT_ID\\\" }) { edges { node { id status } } } }\"}")

          echo "Response: $RESPONSE"

          DEPLOYMENT_ID=$(echo "$RESPONSE" | jq -r '
            .data.deployments.edges[]
            | select(.node.status == "SUCCESS" or .node.status == "DEPLOYING")
            | .node.id' | head -1)

          if [[ -z "$DEPLOYMENT_ID" || "$DEPLOYMENT_ID" == "null" ]]; then
            echo "No active deployment found — already stopped?"
            echo "id=" >> "$GITHUB_OUTPUT"
          else
            echo "Active deployment: $DEPLOYMENT_ID"
            echo "id=$DEPLOYMENT_ID" >> "$GITHUB_OUTPUT"
          fi

      - name: Remove active deployment (stop)
        if: steps.config.outputs.action == 'stop' && steps.deployment.outputs.id != ''
        env:
          TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          RESPONSE=$(curl -s -X POST "$RAILWAY_API" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { deploymentRemove(id: \\\"${{ steps.deployment.outputs.id }}\\\") }\"}")

          echo "Response: $RESPONSE"

          if echo "$RESPONSE" | jq -e '.errors' > /dev/null 2>&1; then
            echo "Failed to remove deployment"
            exit 1
          fi

          echo "Done — Railway service stopped"

      # ── START: trigger redeploy ──────────────────────────────────────────────
      - name: Redeploy service (start)
        if: steps.config.outputs.action == 'start'
        env:
          TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
          ENVIRONMENT_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
        run: |
          RESPONSE=$(curl -s -X POST "$RAILWAY_API" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { serviceInstanceRedeploy(serviceId: \\\"$SERVICE_ID\\\", environmentId: \\\"$ENVIRONMENT_ID\\\") }\"}")

          echo "Response: $RESPONSE"

          if echo "$RESPONSE" | jq -e '.errors' > /dev/null 2>&1; then
            echo "Failed to redeploy service"
            exit 1
          fi

          echo "Done — Railway service started"
