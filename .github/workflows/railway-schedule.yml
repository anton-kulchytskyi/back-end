name: Railway — Nightly Sleep Schedule

on:
  schedule:
    # 22:30 Kyiv (UTC+2 взимку)
    - cron: '30 20 * * *'
    # 08:00 Kyiv (UTC+2 взимку)
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      action:
        description: 'Manual override'
        required: true
        type: choice
        options: [start, stop]

jobs:
  manage-railway:
    runs-on: ubuntu-latest
    steps:
      - name: Determine Action
        id: vars
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "action=${{ github.event.inputs.action }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event.schedule }}" == "30 20 * * *" ]]; then
            echo "action=stop" >> $GITHUB_OUTPUT
          else
            echo "action=start" >> $GITHUB_OUTPUT
          fi

      - name: Execute Railway Action
        run: |
          if [[ "${{ steps.vars.outputs.action }}" == "stop" ]]; then
            echo "Searching for active deployment..."
            
            # Формуємо чистий JSON для запиту
            QUERY='query deployments($serviceId: String!, $environmentId: String!) {
              deployments(input: { serviceId: $serviceId, environmentId: $environmentId }) {
                edges {
                  node {
                    id
                    status
                  }
                }
              }
            }'
            
            VARIABLES=$(printf '{"serviceId":"%s","environmentId":"%s"}' "${{ secrets.RAILWAY_SERVICE_ID }}" "${{ secrets.RAILWAY_ENVIRONMENT_ID }}")
            PAYLOAD=$(jq -n --arg q "$QUERY" --argjson v "$VARIABLES" '{query: $q, variables: $v}')

            RESPONSE=$(curl -s -X POST https://backboard.railway.app/graphql/v2 \
              -H "Authorization: Bearer ${{ secrets.RAILWAY_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD")

            # Перевірка, чи не прийшла помилка від API
            if echo "$RESPONSE" | jq -e '.errors' > /dev/null; then
              echo "API Error: $(echo "$RESPONSE" | jq -r '.errors[0].message')"
              exit 1
            fi

            DEPLOY_ID=$(echo "$RESPONSE" | jq -r '.data.deployments.edges[]? | select(.node.status == "SUCCESS") | .node.id' | head -n 1)

            if [[ -z "$DEPLOY_ID" || "$DEPLOY_ID" == "null" ]]; then
              echo "Full Response for debug: $RESPONSE"
              echo "No active SUCCESS deployment found."
            else
              echo "Removing active deployment: $DEPLOY_ID"
              REMOVE_QUERY="mutation { deploymentRemove(id: \"$DEPLOY_ID\") }"
              curl -s -X POST https://backboard.railway.app/graphql/v2 \
                -H "Authorization: Bearer ${{ secrets.RAILWAY_API_TOKEN }}" \
                -H "Content-Type: application/json" \
                -d "{\"query\": \"$REMOVE_QUERY\"}"
              echo "Done."
            fi
          
          else
            echo "Starting service..."
            REDEPLOY_QUERY="mutation { serviceInstanceRedeploy(serviceId: \"${{ secrets.RAILWAY_SERVICE_ID }}\", environmentId: \"${{ secrets.RAILWAY_ENVIRONMENT_ID }}\") }"
            curl -s -X POST https://backboard.railway.app/graphql/v2 \
              -H "Authorization: Bearer ${{ secrets.RAILWAY_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "{\"query\": \"$REDEPLOY_QUERY\"}"
            echo "Redeploy triggered."
          fi