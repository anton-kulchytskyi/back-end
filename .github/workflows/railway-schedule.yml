name: Railway — Nightly Sleep Schedule

on:
  schedule:
    - cron: '30 20 * * *'  # 22:30 Kyiv (UTC+2 winter) — stop
    - cron: '0 6 * * *'    # 08:00 Kyiv (UTC+2 winter) — start
  workflow_dispatch:
    inputs:
      action:
        description: 'Manual override: start or stop the Railway service'
        required: true
        type: choice
        options:
          - start
          - stop

jobs:
  manage-railway:
    name: Railway ${{ github.event.inputs.action || (github.event.schedule == '30 20 * * *' && 'stop' || 'start') }}
    runs-on: ubuntu-latest

    steps:
      - name: Determine action
        id: config
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "action=${{ github.event.inputs.action }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event.schedule }}" == "30 20 * * *" ]]; then
            echo "action=stop" >> "$GITHUB_OUTPUT"
          else
            echo "action=start" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop service
        if: steps.config.outputs.action == 'stop'
        env:
          TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
          ENV_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
        run: |
          RESPONSE=$(curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg q 'query($serviceId:String!,$environmentId:String!){deployments(input:{serviceId:$serviceId,environmentId:$environmentId}){edges{node{id status}}}}' \
              --argjson v "{\"serviceId\":\"$SERVICE_ID\",\"environmentId\":\"$ENV_ID\"}" \
              '{query:$q,variables:$v}')")

          DEPLOY_ID=$(echo "$RESPONSE" | jq -r '.data.deployments.edges[]? | select(.node.status=="SUCCESS") | .node.id' | head -1)

          if [[ -z "$DEPLOY_ID" || "$DEPLOY_ID" == "null" ]]; then
            echo "No active deployment found — already stopped?"
            exit 0
          fi

          echo "Removing deployment $DEPLOY_ID..."
          curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg q 'mutation($id:String!){deploymentRemove(id:$id)}' \
              --argjson v "{\"id\":\"$DEPLOY_ID\"}" \
              '{query:$q,variables:$v}')"

          echo "Service stopped."

      - name: Start service
        if: steps.config.outputs.action == 'start'
        env:
          TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
          ENV_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
        run: |
          curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg q 'mutation($serviceId:String!,$environmentId:String!){serviceInstanceRedeploy(serviceId:$serviceId,environmentId:$environmentId)}' \
              --argjson v "{\"serviceId\":\"$SERVICE_ID\",\"environmentId\":\"$ENV_ID\"}" \
              '{query:$q,variables:$v}')"

          echo "Redeploy triggered."
