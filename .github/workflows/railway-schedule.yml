name: Railway — Sleep/Wake Schedule

on:
  schedule:
    # All times UTC. Ukraine is UTC+2 (winter) / UTC+3 (summer — update cron accordingly after DST).
    - cron: '30 20 * * *'  # 22:30 Kyiv (UTC+2) — stop service
    - cron: '0 6 * * *'    # 08:00 Kyiv (UTC+2) — start service
  workflow_dispatch:
    inputs:
      action:
        description: 'Manual override: start or stop the Railway service'
        required: true
        type: choice
        options:
          - start
          - stop

jobs:
  manage-railway:
    name: Set Railway service state
    runs-on: ubuntu-latest

    steps:
      - name: Determine action
        id: config
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "action=${{ github.event.inputs.action }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event.schedule }}" == "30 20 * * *" ]]; then
            echo "action=stop" >> "$GITHUB_OUTPUT"
          else
            echo "action=start" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Stop service (railway down)
        if: steps.config.outputs.action == 'stop'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
          RAILWAY_ENVIRONMENT_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
        run: |
          railway down --yes
          echo "Done — Railway service stopped"

      - name: Start service (railway up)
        if: steps.config.outputs.action == 'start'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
          RAILWAY_ENVIRONMENT_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
        run: |
          railway up --detach
          echo "Done — Railway service started"
